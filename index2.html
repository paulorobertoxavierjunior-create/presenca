<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Elayon Presença · Laboratório de Conexões</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f8f8;
      --surface: #ffffff;
      --border: #c8e2e4;
      --cyan: #3ecfcf;
      --cglow: rgba(62,207,207,0.18);
      --teal: #2a9d8f;
      --text: #072024;
      --muted: #4a7a80;
      --red: #ef4444;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .page { width: 100%; max-width: 540px; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(62,207,207,0.02); }
    .card-label { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--cyan); text-transform: uppercase; display: block; margin-bottom: 12px; }
    
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-label { display: block; font-size: 9px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; text-transform: uppercase; }
    .field-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 11px; outline: none; background: var(--bg); color: var(--text); }
    
    .chat-box { height: 280px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .msg { max-width: 85%; padding: 12px; border-radius: 14px; font-size: 13px; line-height: 1.4; position: relative; }
    .msg.ai { background: #e2f1f2; align-self: flex-start; border-radius: 14px 14px 14px 4px; border: 1px solid var(--border); }
    .msg.user { background: var(--teal); color: white; align-self: flex-end; border-radius: 14px 14px 4px 14px; }
    
    .live-stt-box { font-size: 12px; font-style: italic; color: var(--red); background: #fff1f1; padding: 10px; border-radius: 8px; border: 1px dashed var(--red); margin-bottom: 12px; font-family: var(--mono); }
    
    .btn { padding: 12px 16px; border: none; border-radius: 10px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
    .btn-cyan { background: var(--cyan); color: #072024; box-shadow: 0 4px 10px var(--cglow); }
    .btn-red { background: var(--red); color: white; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-full { width: 100%; display: block; }
    .btn-download { background: #10b981; color: white; margin-top: 10px; }
    
    .log-terminal { background: #0b1d20; color: #7bf5f5; font-family: var(--mono); font-size: 10px; padding: 12px; border-radius: 8px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; margin-top: 8px; border: 1px solid #1c3d42; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">

  <div class="card">
    <span class="card-label" id="panelIdentity">⚙️ CENTRAL DE INFRAESTRUTURA (REPOS-MOTOR-ADMIN)</span>
    
    <div class="field-grid">
      <div>
        <label class="field-label">Render Backend (Motor/CRS)</label>
        <input type="text" id="cfgRenderUrl" class="field-input" value="https://presenca-1yuy.onrender.com" />
      </div>
      <div>
        <label class="field-label">Supabase URL (Admin/Métricas)</label>
        <input type="text" id="cfgSupabaseUrl" class="field-input" value="https://eudcjlhffrfmhzmfwtlg.supabase.co" />
      </div>
    </div>

    <div class="field-grid">
      <div>
        <label class="field-label">Supabase Anon Key (Publishable)</label>
        <input type="text" id="cfgSupabaseKey" class="field-input" value="sb_publishable_eFXj7d8dOSREvEJbZ0xQJg_NgPCI8Nz" />
      </div>
      <div>
        <label class="field-label">Gemini API Key (Injeção)</label>
        <input type="password" id="cfgGeminiKey" class="field-input" placeholder="AIzaSy..." />
      </div>
    </div>

    <button class="btn btn-cyan btn-full" id="btnTestarConexões">Disparar Check Geral de Conectividade</button>
    <div class="log-terminal" id="terminalLogs">> Console pronto. Preencha sua chave Gemini e inicie a varredura.</div>
  </div>

  <div class="card hidden" id="areaPainelSimbiotico">
    <span class="card-label">🎙️ CORE DE AUDITORIA DE PRESENÇA (REPOSITÓRIO: PRESENCA)</span>
    
    <div class="chat-box" id="chatMensagens"></div>

    <div class="live-stt-box hidden" id="monitorSTT">
      🔴 MICROFONE ABERTO (CAPTURANDO): <span id="sttTextoReal" style="color: var(--text); font-style: normal; font-weight: bold;">...</span>
    </div>

    <div id="controleTeclado" class="hidden" style="display: flex; gap: 8px;">
      <input type="text" id="chatInputTexto" class="field-input" style="margin-bottom:0; flex:1;" placeholder="Digite o texto solicitado pela IA..." />
      <button class="btn btn-cyan" id="btnEnviarTexto">Enviar</button>
    </div>

    <div id="controleMicrofone" class="hidden" style="display: flex; gap: 8px;">
      <button class="btn btn-cyan" style="flex: 1;" id="btnAcionarMic">🎙️ Abrir Canal Acústico</button>
      <button class="btn btn-red hidden" style="flex: 1;" id="btnDesligarMic">⏹️ Cortar e Transcrever</button>
    </div>

    <div style="margin-top: 10px; display: flex; gap: 6px;">
      <button class="btn btn-ghost hidden" id="btnRefazerEtapa" style="font-size:8px;">🔄 Recalibrar Sinal</button>
      <button class="btn btn-cyan hidden" id="btnAvancarFase" style="flex:1; background: var(--teal); color:white;">Despachar Metadados para o CRS ➔</button>
    </div>
  </div>

  <div class="card">
    <span class="card-label">🔑 CHAVE EXTERNA REAL LIBERADA</span>
    <label class="field-label">Token de Conexão Externa (Desbloqueado após cruzamento)</label>
    <input type="text" id="tokenSaidaFinal" class="field-input" placeholder="Aguardando validação semântica e temporal..." disabled />
    <div id="metaTempoCaixa" style="font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 4px;"></div>
    
    <button class="btn btn-download btn-full hidden" id="btnBaixarRelatorio">💾 Baixar Relatório de Fluxo Operacional</button>
  </div>

</div>

<script>
  let logTerm = document.getElementById('terminalLogs');
  let reconhecimentoVoz = null;
  let bufferVoz = '';
  let faseFluxo = 'inicial'; 
  
  let metricasTempo = {
    inicioVoz: null, fimVoz: null,
    inicioTeclado: null, fimTeclado: null
  };

  let historicoExecucao = {
    timestamp: new Date().toISOString(),
    usuario: "Desconhecido",
    tempoVozSegundos: 0,
    tempoTecladoSegundos: 0,
    respostaIA: "",
    cargaCognitiva: ""
  };

  function logger(msg) {
    logTerm.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
    logTerm.scrollTop = logTerm.scrollHeight;
  }

  // PERSISTÊNCIA DA SESSÃO ATIVA DO SUPABASE
  function verificarSessaoAtiva() {
    const supaStorageKey = "sb-eudcjlhffrfmhzmfwtlg-auth-token";
    const sessionData = localStorage.getItem(supaStorageKey);

    if (sessionData) {
      try {
        const parsed = JSON.parse(sessionData);
        const emailUsuario = parsed.user?.email;
        historicoExecucao.usuario = emailUsuario;
        logger(`✓ Usuário autenticado recuperado via LocalStorage: ${emailUsuario}`);
        document.getElementById('panelIdentity').innerText = `🎙️ OPERADOR: ${emailUsuario} (SESSÃO ATIVA)`;
      } catch (e) {
        logger("Aviso: Falha na análise da sessão local existente.");
      }
    } else {
      logger("⚠️ Nenhuma sessão ativa no storage local. Operando em modo isolado.");
    }
  }

  window.addEventListener('DOMContentLoaded', verificarSessaoAtiva);

// CHECAGEM DE CONEXÕES
  document.getElementById('btnTestarConexões').addEventListener('click', async () => {
    logger("Iniciando varredura de infraestrutura...");
    const rUrl = document.getElementById('cfgRenderUrl').value.trim();
    const sUrl = document.getElementById('cfgSupabaseUrl').value.trim();
    const sKey = document.getElementById('cfgSupabaseKey').value.trim();
    const gKey = document.getElementById('cfgGeminiKey').value.trim();

    try {
      logger(`Pingando Motor no Render: ${rUrl}`);
      const res = await fetch(`${rUrl}/`);
      const data = await res.json();
      logger(`✓ Motor (Render) Respondeu: ${JSON.stringify(data)}`);
    } catch(e) {
      logger(`❌ Motor no Render inacessível: ${e.message}`);
    }

    if(sUrl && sKey) {
      try {
        logger(`Testando conexão direta na REST API do Supabase...`);
        const resSupa = await fetch(`${sUrl}/rest/v1/`, {
          headers: { "apikey": sKey, "Authorization": `Bearer ${sKey}` }
        });
        if(resSupa.ok) logger(`✓ Conectividade com a base de dados validada.`);
        else logger(`⚠️ Supabase respondeu com status ${resSupa.status}`);
      } catch(e) {
        logger(`❌ Falha física no Supabase: ${e.message}`);
      }
    }

    if(gKey) {
      logger("✓ Ambiente liberado para interação simbiótica.");
      document.getElementById('areaPainelSimbiotico').classList.remove('hidden');
      dispararAberturaIA();
    } else {
      logger("❌ Chave API do Gemini ausente. Forneça o token para liberar o chat.");
    }
  });

  function dispararAberturaIA() {
    adicionarBubble('ai', "Instâncias integradas! Sou a IA de calibração ativa do repositório 'presenca'. Para iniciarmos o alinhamento semântico, leia a sentença de segurança em voz alta:\n\n'Canal acústico estabelecido. Protocolo Elayon em sincronia de amostragem.'");
    faseFluxo = 'voz_lendo';
    document.getElementById('controleMicrofone').classList.remove('hidden');
    document.getElementById('btnRefazerEtapa').classList.remove('hidden');
  }

  function adicionarBubble(autor, texto) {
    const box = document.getElementById('chatMensagens');
    const b = document.createElement('div');
    b.className = `msg ${autor}`;
    b.innerText = texto;
    box.appendChild(b);
    box.scrollTop = box.scrollHeight;
  }

  // CANAL ACÚSTICO
  btnAcionarMic.addEventListener('click', () => {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Speech) return alert("Navegador incompatível com captação nativa de áudio.");
    
    reconhecimentoVoz = new Speech();
    reconhecimentoVoz.continuous = true;
    reconhecimentoVoz.interimResults = true;
    reconhecimentoVoz.lang = 'pt-BR';
    bufferVoz = '';

    metricasTempo.inicioVoz = Date.now();
    document.getElementById('monitorSTT').classList.remove('hidden');
    btnAcionarMic.classList.add('hidden');
    document.getElementById('btnDesligarMic').classList.remove('hidden');

    reconhecimentoVoz.onresult = (event) => {
      let intermediario = '';
      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) bufferVoz += event.results[i][0].transcript;
        else intermediario += event.results[i][0].transcript;
      }
      document.getElementById('sttTextoReal').innerText = bufferVoz || intermediario;
    };

    reconhecimentoVoz.start();
  });

  document.getElementById('btnDesligarMic').addEventListener('click', () => {
    if(reconhecimentoVoz) reconhecimentoVoz.stop();
    metricasTempo.fimVoz = Date.now();
    
    document.getElementById('monitorSTT').classList.add('hidden');
    document.getElementById('btnDesligarMic').classList.add('hidden');
    btnAcionarMic.classList.remove('hidden');

    const falaFinal = document.getElementById('sttTextoReal').innerText;
    adicionarBubble('user', `[Áudio Transcrito]: ${falaFinal}`);
    
    let tVoz = ((metricasTempo.fimVoz - metricasTempo.inicioVoz) / 1000).toFixed(1);
    historicoExecucao.tempoVozSegundos = parseFloat(tVoz);
    
    faseFluxo = 'escrita_esperando';
    adicionarBubble('ai', "✓ Voz processada. Próxima etapa: Teclado ativado. Escreva um texto explicativo de no mínimo 30 caracteres para calibração rítmica de digitação.");
    metricasTempo.inicioTeclado = Date.now();
    document.getElementById('controleMicrofone').classList.add('hidden');
    document.getElementById('controleTeclado').classList.remove('hidden');
  });

  // CANAL DE DIGITAÇÃO
  document.getElementById('btnEnviarTexto').addEventListener('click', () => {
    const txt = document.getElementById('chatInputTexto').value.trim();
    if(txt.length < 30) {
      adicionarBubble('ai', "Amostragem muito curta. Digite ao menos 30 caracteres.");
      return;
    }
    metricasTempo.fimTeclado = Date.now();
    adicionarBubble('user', txt);
    document.getElementById('chatInputTexto').value = '';
    
    let tTeclado = ((metricasTempo.fimTeclado - metricasTempo.inicioTeclado) / 1000).toFixed(1);
    historicoExecucao.tempoTecladoSegundos = parseFloat(tTeclado);

    document.getElementById('controleTeclado').classList.add('hidden');
    document.getElementById('btnAvancarFase').classList.remove('hidden');
    
    adicionarBubble('ai', "✓ Capturas prontas. Clique em Despachar Metadados para o processamento final da IA.");
    document.getElementById('metaTempoCaixa').innerText = `Voz: ${historicoExecucao.tempoVozSegundos}s | Teclado: ${historicoExecucao.tempoTecladoSegundos}s`;
  });

  // DESPACHO E EMISSÃO DE PRODUTO
  document.getElementById('btnAvancarFase').addEventListener('click', async () => {
    logger("Consolidando metadados estruturados para envio...");
    const rUrl = document.getElementById('cfgRenderUrl').value.trim();
    const gKey = document.getElementById('cfgGeminiKey').value.trim();

    const payloadCompleto = {
      mensagem_usuario: "Canal bio-rítmico estruturado com sucesso.",
      provedor: "gemini",
      api_key_externa: gKey,
      metricas_sinal: {
        silencio_voz_pct: Math.min(Math.round(historicoExecucao.tempoVozSegundos * 4), 100),
        hesitacao_escrita_pct: Math.min(Math.round(historicoExecucao.tempoTecladoSegundos * 3), 100),
        total_intervalos: 10
      }
    };

    try {
      const responseRender = await fetch(`${rUrl}/api/crs/processar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payloadCompleto)
      });

      const resultado = await responseRender.json();
      
      if(responseRender.ok) {
        adicionarBubble('ai', `[Elayon CRS Engine]: ${resultado.resposta_ia}`);
        logger(`✓ Execução finalizada. Diagnóstico: ${resultado.carga_cognitiva}`);
        
        historicoExecucao.respostaIA = resultado.resposta_ia;
        historicoExecucao.cargaCognitiva = resultado.carga_cognitiva;

        const tokenFinal = document.getElementById('tokenSaidaFinal');
        tokenFinal.removeAttribute('disabled');
        tokenFinal.value = "ELAYON-ACTIVE-" + Math.random().toString(36).substring(3, 11).toUpperCase();
        
        // Libera botão de download do relatório
        document.getElementById('btnBaixarRelatorio').classList.remove('hidden');
      } else {
        logger(`❌ O motor reportou erro interno: ${resultado.detail}`);
      }
    } catch (err) {
      logger(`❌ Erro crítico na requisição ao motor: ${err.message}`);
    }
  });

// LÓGICA DE GERAÇÃO E DOWNLOAD DO RELATÓRIO TXT
  document.getElementById('btnBaixarRelatorio').addEventListener('click', () => {
    const conteudoRelatorio = `==================================================
ELAYON PRESENÇA V3.0 - RELATÓRIO DE FLUXO OPERACIONAL
==================================================
Data/Hora da Execução : ${historicoExecucao.timestamp}
Operador Identificado : ${historicoExecucao.usuario}
--------------------------------------------------
MÉTRICAS TEMPORAIS COLETADAS:
Tempo de Captura Acústica (Voz)    : ${historicoExecucao.tempoVozSegundos} segundos
Tempo de Captura Rítmica (Teclado) : ${historicoExecucao.tempoTecladoSegundos} segundos
--------------------------------------------------
DIAGNÓSTICO DO MOTOR (RENDER):
Carga Cognitiva Atribuída          : ${historicoExecucao.cargaCognitiva}
--------------------------------------------------
RESPOSTA COGNITIVA DA IA RECEPTORA:
"${historicoExecucao.respostaIA}"
==================================================`;

    const blob = new Blob([conteudoRelatorio], { type: "text/plain;charset=utf-8" });
    const urlBlob = URL.createObjectURL(blob);
    const linkDonwload = document.createElement("a");
    linkDonwload.href = urlBlob;
    linkDonwload.download = `elayon-relatorio-${Date.now()}.txt`;
    document.body.appendChild(linkDonwload);
    linkDonwload.click();
    document.body.removeChild(linkDonwload);
    URL.revokeObjectURL(urlBlob);
    logger("✓ Relatório operacional baixado pelo sistema.");
  });

  document.getElementById('btnRefazerEtapa').addEventListener('click', () => {
    document.getElementById('chatMensagens').innerHTML = '';
    document.getElementById('btnAvancarFase').classList.add('hidden');
    document.getElementById('btnBaixarRelatorio').classList.add('hidden');
    dispararAberturaIA();
    logger("Calibração reinicializada pelo desenvolvedor.");
  });
</script>
</body>
</html>
