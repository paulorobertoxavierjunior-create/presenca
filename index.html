<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{. 
  --bg:#f4f9f8;--surface:#fff;--border:#dceeed;--text:#1a2b2a;--sub:#5f7c7a;
  --cyan:#3bbfb7;--teal:#1f9e96;--green:#3abf82;--blue:#4a9fd4;
  --danger:#e05252;--warn:#e0952a;
  --mono:'DM Mono',monospace;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',sans-serif;
  --r:14px;--sh:0 2px 18px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh;padding-bottom:80px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.logo{display:flex;align-items:center;gap:9px}
.logo img{width:36px;height:36px;object-fit:contain;border-radius:50%}
.logo-fb{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--teal));display:none;align-items:center;justify-content:center;flex-shrink:0}
.logo-fb svg{width:18px;height:18px}
.logo-name{font-family:var(--serif);font-size:1.2rem;font-weight:400;letter-spacing:.02em}
.logo-name em{color:var(--cyan);font-style:italic}
.hdr-right{display:flex;align-items:center;gap:8px}
.saldo-chip{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:5px 11px;display:flex;flex-direction:column;align-items:flex-end;cursor:pointer;transition:border-color .18s}
.saldo-chip:hover{border-color:var(--cyan)}
.saldo-lbl{font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sub)}
.saldo-val{font-family:var(--mono);font-size:.86rem;color:var(--teal);font-weight:400}

/* MAIN */
main{max-width:640px;margin:0 auto;padding:24px 15px 0}
.page-title{font-family:var(--serif);font-size:1.8rem;font-weight:300;margin-bottom:2px}
.page-sub{font-size:.76rem;color:var(--sub);margin-bottom:22px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.card-hdr{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-ico{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e2f7f5,#c6efec);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-ico svg{width:13px;height:13px;color:var(--teal)}
.card-ttl{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--sub)}
.card-body{padding:16px}

/* SPECTRO */
.spectro-wrap{height:66px;border-radius:8px;overflow:hidden;background:#0d1f1e;margin-bottom:7px;position:relative}
#spectrCanvas{width:100%;height:100%;display:block}
.spectro-bar{display:flex;justify-content:space-between;align-items:center}
.spectro-state{font-family:var(--mono);font-size:.66rem;color:var(--cyan);letter-spacing:.06em}
.spectro-timer{font-family:var(--mono);font-size:.88rem;color:var(--text);letter-spacing:.1em}

/* STATUS */
.status-strip{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:12px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--sub);flex-shrink:0;transition:background .3s}
.sdot.idle{background:var(--sub)}.sdot.rec{background:#e05252;animation:blink 1.1s infinite}
.sdot.paused{background:var(--warn)}.sdot.ready{background:var(--green)}
.sdot.sending{background:var(--cyan);animation:blink .6s infinite}
.sdot.done{background:var(--green)}.sdot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.stxt{font-size:.76rem;color:var(--sub);font-weight:300}

/* BOTÕES */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 13px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:.78rem;font-weight:400;cursor:pointer;transition:all .16s ease;-webkit-tap-highlight-color:transparent}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:hover{border-color:var(--cyan);color:var(--teal)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--teal));border-color:transparent;color:#fff;font-weight:500}
.btn-primary:hover{filter:brightness(1.07);border-color:transparent;color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),#1a9e65);border-color:transparent;color:#fff;font-weight:500}
.btn-green:hover{filter:brightness(1.07);border-color:transparent;color:#fff}
.btn-danger{border-color:#fad7d4;color:var(--danger);background:#fff8f7}
.btn-danger:hover{background:#faeae8;border-color:var(--danger);color:var(--danger)}
.btn-full{width:100%}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.col2{grid-column:1/-1}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .18s,background .18s;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--cyan);background:#f0fdfc}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-lbl{font-size:.76rem;color:var(--sub)}
.upload-lbl strong{color:var(--teal);font-weight:400}
.upload-fname{margin-top:5px;font-family:var(--mono);font-size:.66rem;color:var(--cyan);display:none}

/* RELATÓRIO */
.rel-card{display:none}
.rel-estado{font-family:var(--serif);font-size:1.08rem;font-weight:400;color:var(--teal);margin-bottom:3px}
.rel-sug{font-size:.76rem;color:var(--text);font-weight:300;line-height:1.6;margin-bottom:12px}
.rel-tag{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);margin-bottom:5px}
.rel-json{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--mono);font-size:.68rem;line-height:1.75;color:var(--text);white-space:pre-wrap;max-height:260px;overflow-y:auto}

/* SESSÕES */
.sec-lbl{font-size:.64rem;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);margin-bottom:9px;padding-left:1px}
.sess-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;-webkit-tap-highlight-color:transparent;transition:border-color .16s}
.sess-item:hover{border-color:var(--cyan)}
.sess-thumb{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,#e2f7f5,#c6efec);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sess-thumb svg{width:15px;height:15px;color:var(--teal)}
.sess-info{flex:1;min-width:0}
.sess-name{font-size:.78rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-meta{font-size:.64rem;color:var(--sub);margin-top:2px;font-family:var(--mono)}
.sess-badge{font-size:.58rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:3px 7px;border-radius:20px;flex-shrink:0}
.b-single{background:#e2f7f5;color:var(--teal)}.b-memory{background:#e2eeff;color:#3060c0}
.sess-empty{text-align:center;padding:20px 14px;color:var(--sub);font-size:.78rem;font-style:italic;font-family:var(--serif);border:1.5px dashed var(--border);border-radius:10px}

/* LOG */
.log-wrap{background:#0d1f1e;border-radius:8px;padding:11px 13px;height:190px;overflow-y:auto;font-family:var(--mono);font-size:.68rem;line-height:1.7}
.log-wrap::-webkit-scrollbar{width:3px}
.log-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-line.info{color:#5dd9d0}.log-line.ok{color:#5bcf96}.log-line.warn{color:#e0a72a}
.log-line.err{color:#e05252}.log-line.data{color:#8eb8ff}.log-line.sys{color:#7a9a98}
.log-actions{display:flex;justify-content:flex-end;margin-top:5px}
.log-clear-btn{font-size:.63rem;color:var(--sub);cursor:pointer;background:none;border:none;font-family:var(--sans)}
.log-clear-btn:hover{color:var(--teal)}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border) 20%,var(--border) 80%,transparent);margin:13px 0}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(10,25,24,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.on{opacity:1;pointer-events:all}

.overlay.on .sheet{transform:translateY(0)}
.sheet-handle{width:32px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.sheet-title{font-family:var(--serif);font-size:1.25rem;font-weight:400;margin-bottom:3px}
.sheet-sub{font-size:.74rem;color:var(--sub);margin-bottom:16px;font-weight:300}

/* AGUARDO */

.aguardo.on{display:block}
.spinner{width:34px;height:34px;border:2.5px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 11px}

.aguardo-txt{font-family:var(--serif);font-size:.96rem;font-weight:300;font-style:italic;color:var(--sub)}
.aguardo-sub{font-size:.66rem;font-family:var(--mono);color:var(--cyan);margin-top:3px;letter-spacing:.08em}

/* TOAST */

<body>

<header>
  <div class="logo">
    <img src="IMG-20260218-WA0015.jpg" alt="Elayon" onerror="this.style.display='none';document.getElementById('lFb').style.display='flex'"/>
    <div class="logo-fb" id="lFb">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 11l-2 4M16 11l2 4"/><path d="M6 19h12"/></svg>

<main>
  <h1 class="page-title">Laboratório de Presença</h1>
  <p class="page-sub">Onde o silêncio ganha métrica.</p>

  <div class="card">
    <div class="card-hdr">
      <div class="card-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>

    <div class="card-hdr">
      <div class="card-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>

    </div>

        <button class="btn btn-primary" id="btnLigar" onclick="iniciarGravacao()">Ligar Mic</button>
        <button class="btn btn-danger" id="btnStop" disabled onclick="pararGravacao()">Stop</button>
        <button class="btn btn-green col2" id="btnEnviar" disabled onclick="confirmarEnvio()">Enviar Análise CRS</button>
      </div>

        <input type="file" id="audioUpload" accept="audio/*" onchange="handleUpload(event)"/>

<script>

/* ═══════════════════════════════════════
   CONFIGURAÇÕES ÚNICAS (ALINHAMENTO)
   ═══════════════════════════════════════ */
const CRS_URL = 'https://nucleo-crs-elayon.onrender.com';
const LOGIN_URL = 'https://paulorobertoxavierjunior-create.github.io/elayon-cadastro/login.html';

const S = {
  gravando:false, audioCtx:null, analyser:null, mediaRecorder:null, chunks:[],
  segundos:0, timerInt:null, blob:null, saldo:10,
  silentFrames:0, totalFrames:0, pausas:[], volHistory:[]
};

// Captura o Token do Supabase de forma transparente
function getAuthToken() {
    try {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('sb-') && key.endsWith('-auth-token')) {
                const session = JSON.parse(localStorage.getItem(key));
                return session?.access_token || null;
            }
        }
    } catch (e) { console.error("Erro ao ler storage", e); }
    return null;
}

/* ═══════════════════════════════════════
   LÓGICA DE CAPTAÇÃO
   ═══════════════════════════════════════ */
async function iniciarGravacao() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        S.analyser = S.audioCtx.createAnalyser();
        S.audioCtx.createMediaStreamSource(stream).connect(S.analyser);
        S.mediaRecorder = new MediaRecorder(stream);
        S.chunks = [];
        
        S.mediaRecorder.ondataavailable = e => S.chunks.push(e.data);
        S.mediaRecorder.onstop = () => {
            S.blob = new Blob(S.chunks, { type: 'audio/webm' });
            log('ok', 'Áudio processado e pronto para envio.');
            document.getElementById('btnEnviar').disabled = false;
        };
        
        S.mediaRecorder.start();
        S.gravando = true;
        document.getElementById('sdot').className = 'sdot rec';
        document.getElementById('stxt').textContent = 'Gravando...';
        document.getElementById('btnLigar').disabled = true;
        document.getElementById('btnStop').disabled = false;
        startTimer();
    } catch (e) { log('err', 'Microfone não autorizado.'); }
}

function pararGravacao() {
    S.mediaRecorder.stop();
    S.mediaRecorder.stream.getTracks().forEach(t => t.stop());
    S.gravando = false;
    clearInterval(S.timerInt);
    document.getElementById('sdot').className = 'sdot ready';
    document.getElementById('stxt').textContent = 'Pronto para enviar';
}

function startTimer() {
    S.segundos = 0;
    S.timerInt = setInterval(() => {
        S.segundos++;
        const m = String(Math.floor(S.segundos/60)).padStart(2,'0');
        const s = String(S.segundos%60).padStart(2,'0');
        document.getElementById('recTimer').textContent = `${m}:${s}`;
    }, 1000);
}

/* ═══════════════════════════════════════
   ENVIO E INTEGRAÇÃO CRS (SALTO TECNOLÓGICO)
   ═══════════════════════════════════════ */
async function confirmarEnvio() {
    const token = getAuthToken();
    if (!token) {
        toast("Sessão expirada. Redirecionando...");
        setTimeout(() => window.location.href = LOGIN_URL, 2000);
        return;
    }

    document.getElementById('ovEnvio').classList.add('on');
    log('info', 'Extraindo métricas da consciência...');

    // --- CONEXÃO COM A LÓGICA DO SEU APP.JS ---
    // Aqui usamos os dados reais que o seu loop capturou
    const ritmo = calcRitmo(S.volHistory || []);
    const silencio = calcSilencio(S.volHistory || []);
    const hesitacao = (S.pausas || []).filter(p => p > 1200).length;

    const payload = {
        duration_sec: S.segundos || 5,
        silence_pct: silencio,      // AGORA É REAL
        pause_count: hesitacao,     // AGORA É REAL
        oscillation_pct: ritmo,     // AGORA É REAL
        stability_pct: 100 - ritmo, 
        spectrum_snapshot: { 
            graves: 40, 
            medios: 50, 
            agudos: 10 
        }
    };

    try {
        log('info', 'Transmitindo ao Núcleo no Render...');
        const res = await fetch(`${CRS_URL}/api/crs/analisar`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (data.ok) {
            log('ok', 'Sincronização concluída.');
            exibirRelatorio(data); // Mostra o diagnóstico na tela
        } else {
            log('err', `Núcleo recusou: ${data.error}`);
            toast(data.error);
        }
    } catch (e) {
        log('err', 'Falha crítica: O Núcleo não respondeu.');
    } finally {
        document.getElementById('ovEnvio').classList.remove('on');
    }
}

function exibirRelatorio(json) {
    document.getElementById('relEstado').textContent = json.analise_sugestiva;
    document.getElementById('relSug').textContent = json.sugestao_ia;
    document.getElementById('relJSON').textContent = JSON.stringify(json.relatorio, null, 2);
    document.getElementById('relCard').style.display = 'block';
}

function log(tipo, msg) {
    const box = document.getElementById('logBox');
    box.innerHTML += `<div class="log-line ${tipo}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
}

function limparLog() { document.getElementById('logBox').innerHTML = ''; }

function handleUpload(e) {
    S.blob = e.target.files[0];
    document.getElementById('uploadFname').textContent = S.blob.name;
    document.getElementById('uploadFname').style.display = 'block';
    document.getElementById('btnEnviar').disabled = false;
    log('info', `Arquivo carregado: ${S.blob.name}`);
}
</script>
