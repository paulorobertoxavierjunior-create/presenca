<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ELAYON CRS Cockpit</title>

<style>
body {
  margin: 0;
  background: #050c12;
  color: #7fffd4;
  font-family: monospace;
}

.container {
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  height: 50px;
}

.status {
  color: #00ff9f;
}

/* BOTÃO */
.mic-btn {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #0ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 0 20px #0ff;
}

/* PAINEL */
.panel {
  margin-top: 20px;
  border: 1px solid #0ff;
  padding: 15px;
}

/* BARRA */
.bar {
  height: 10px;
  background: #022;
  margin-top: 5px;
  position: relative;
}

.bar-fill {
  height: 100%;
  width: 0%;
  background: #0ff;
}

/* SLOTS */
.slots {
  display: flex;
  gap: 10px;
}

.slot {
  flex: 1;
  border: 1px solid #0ff;
  padding: 10px;
}

/* JSON */
pre {
  background: black;
  padding: 10px;
  color: #0f0;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="IMG-20260218-WA0015.jpg" class="logo">
    <div id="status" class="status">offline</div>
  </div>

  <!-- SENSOR -->
  <div class="panel">
    <div class="mic-btn" onclick="toggleMic()">🎤</div>
  </div>

  <!-- ESPELHO -->
  <div class="panel">
    <h3>Espelho Operacional</h3>

    Intensidade
    <div class="bar"><div id="barVolume" class="bar-fill"></div></div>

    Ritmo
    <div class="bar"><div id="barRitmo" class="bar-fill"></div></div>

    Silêncio
    <div class="bar"><div id="barSilencio" class="bar-fill"></div></div>

    <p id="estado">estado: --</p>
  </div>

  <!-- FIFO -->
  <div class="panel">
    <h3>Tendência CRS</h3>
    <div class="slots">
      <div class="slot" id="s0">T-0</div>
      <div class="slot" id="s1">T-1</div>
      <div class="slot" id="s2">T-2</div>
    </div>
  </div>

  <!-- JSON -->
  <div class="panel">
    <h3>CRS JSON</h3>
    <pre id="json"></pre>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
