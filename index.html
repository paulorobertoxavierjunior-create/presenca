<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELAYON | CRS Operational</title>
    <style>
        :root {
            --bg-deep: #050f12;
            --panel-bg: rgba(11, 26, 30, 0.95);
            --neon-mint: #6ec1c8;
            --mint-glow: rgba(110, 193, 200, 0.3);
            --border-color: rgba(110, 193, 200, 0.2);
            --text-main: #d6fff6;
            --accent-warn: #c8a36e;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', 'Consolas', monospace; transition: 0.3s; }
        
        body {
            background: var(--bg-deep);
            background-image: radial-gradient(circle at center, #0a2228 0%, #050f12 100%);
            color: var(--text-main);
            margin: 0;
            display: grid;
            grid-template-rows: 60px 1fr 140px;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header --- */
        .topbar {
            padding: 0 25px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; border-radius: 4px; border: 1px solid var(--neon-mint); }

        /* --- Layout Principal --- */
        .main-grid {
            display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; padding: 20px;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex; flex-direction: column;
        }

        /* --- Esquerda: Config & Upload --- */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--neon-mint); margin-bottom: 5px; }
        input, select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            color: white; padding: 8px; border-radius: 4px; outline: none;
        }

        .upload-btn {
            border: 1px dashed var(--neon-mint); padding: 15px; text-align: center;
            font-size: 11px; cursor: pointer; border-radius: 8px; margin-top: 10px;
        }
        .upload-btn:hover { background: var(--mint-glow); }

        /* --- Centro: Recording Core --- */
        .core-capture {
            justify-content: center; align-items: center; position: relative;
            background-image: url('IMG-20260218-WA0015.jpg');
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 100px #000;
        }

        .record-trigger {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--neon-mint);
            background: rgba(0,0,0,0.6);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px var(--mint-glow);
        }
        .record-trigger.active { background: #ff4b4b; border-color: #ff4b4b; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 75, 75, 0.4); } 100% { box-shadow: 0 0 0 25px rgba(255, 75, 75, 0); } }

        /* --- Direita: Histórico --- */
        .session-list { list-style: none; padding: 0; margin-top: 10px; }
        .session-item {
            font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #1a3a3a; color: var(--neon-mint); }

        /* --- Footer: Ações --- */
        .action-bar {
            background: #000; border-top: 1px solid var(--border-color);
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; padding: 25px;
        }

        .btn {
            height: 100%; border: none; border-radius: 6px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-save { background: #173b42; color: var(--neon-mint); border: 1px solid var(--neon-mint); }
        .btn-crs { background: var(--neon-mint); color: #050f12; }
        .btn-download { background: #222; color: #fff; }
        .btn-export { background: #c8a36e; color: #000; }

        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

    </style>
</head>
<body>

    <header class="topbar">
        <div class="logo-area">
            <img src="IMG-20260218-WA0015.jpg" class="logo-img" alt="Logo">
            <div style="font-weight: bold; letter-spacing: 1px;">ELAYON <span style="color: var(--neon-mint)">HEALTH</span></div>
        </div>
        <div style="font-size: 11px; color: var(--neon-mint)">PROTOCOL: ACTIVE • SESSÃO: 0042</div>
    </header>

    <main class="main-grid">
        <aside class="glass-panel">
            <div class="input-group">
                <label>ID Paciente</label>
                <input type="text" placeholder="Ex: 882.10-A">
            </div>
            <div class="input-group">
                <label>Protocolo CRS</label>
                <select>
                    <option>Triagem Vocal Rápida</option>
                    <option>Neurologia Estendida</option>
                </select>
            </div>
            <div class="upload-btn" onclick="document.getElementById('fileIn').click()">
                <input type="file" id="fileIn" hidden>
                [+] CARREGAR ÁUDIO EXTERNO
            </div>
        </aside>

        <section class="glass-panel core-capture">
            <div class="record-trigger" id="micBtn" onclick="toggleRecord()">
                <span id="micIcon" style="font-size: 40px;">●</span>
            </div>
            <p id="timer" style="margin-top: 20px; font-family: monospace; letter-spacing: 3px;">00:00:00</p>
            <div style="font-size: 10px; opacity: 0.7;">ISO-MIC MONITORING ACTIVE</div>
        </section>

        <aside class="glass-panel">
            <label>Últimas Sessões</label>
            <div class="session-list">
                <div class="session-item">
                    <span>SESS_041.wav</span>
                    <span class="status-tag">PROCESSADO</span>
                </div>
                <div class="session-item">
                    <span>SESS_040.wav</span>
                    <span class="status-tag">CRS_OK</span>
                </div>
                <div class="session-item">
                    <span>SESS_039.wav</span>
                    <span class="status-tag">LOCAL</span>
                </div>
            </div>
            <div style="margin-top: auto;">
                <label>Link de Entrega CRS</label>
                <div style="font-size: 10px; color: var(--neon-mint); cursor: pointer; text-decoration: underline;">
                    📥 Baixar_Relatorio_Final_041.pdf
                </div>
            </div>
        </aside>
    </main>

    <footer class="action-bar">
        <button class="btn btn-save">💾 Salvar Local</button>
        <button class="btn btn-download">⬇️ Exportar WAV</button>
        <button class="btn btn-export">📋 Gerar Relatório</button>
        <button class="btn btn-crs" onclick="sendToCRS()">🚀 ENVIAR PARA CRS</button>
    </footer>

    <script>
        let recording = false;
        function toggleRecord() {
            recording = !recording;
            const btn = document.getElementById('micBtn');
            const icon = document.getElementById('micIcon');
            
            if(recording) {
                btn.classList.add('active');
                icon.innerText = "■";
                icon.style.color = "white";
            } else {
                btn.classList.remove('active');
                icon.innerText = "●";
                icon.style.color = "var(--neon-mint)";
                alert("Gravação finalizada e armazenada temporariamente.");
            }
        }

        function sendToCRS() {
            const btn = document.querySelector('.btn-crs');
            btn.innerText = "ENVIANDO...";
            setTimeout(() => {
                btn.innerText = "🚀 ENVIAR PARA CRS";
                alert("Dados despachados para o Core CRS com sucesso!");
            }, 1500);
        }
    </script>
</body>
</html>
